<div class="page-header d-print-none mt-4">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col">
        <h2 class="page-title" style="color: var(--tblr-primary); font-weight: 700;">
          <i class="ti ti-layout-dashboard me-2"></i> Bảng Điều Khiển
        </h2>
        <div class="text-muted mt-1" style="font-size: 13px;">Tóm tắt hiệu suất cá nhân và công việc cần làm</div>
      </div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">
    <div class="row g-4">
      
      <div class="col-lg-8">
        <div id="adminGlobalStats" style="display: none; margin-bottom: 24px;">
          <h4 class="mb-3 text-uppercase text-muted fw-bold" style="font-size: 11px; letter-spacing: 1px;">TỔNG QUAN HỆ THỐNG (ADMIN)</h4>
          <div class="row g-3">
            <div class="col-sm-3">
              <div class="card metric-card" style="border-bottom: 3px solid #4263eb;">
                <div class="card-body p-3 d-flex flex-column justify-content-center">
                  <div class="d-flex align-items-center gap-2 mb-2"><i class="ti ti-users text-indigo fs-2"></i><div class="text-muted fw-medium" style="font-size: 11px; text-transform: uppercase;">Tổng Khách Hàng</div></div>
                  <div class="fs-2 fw-bold text-dark" id="admTotalCus"><span class="spinner-border spinner-border-sm text-muted"></span></div>
                </div>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="card metric-card" style="border-bottom: 3px solid #0ca678;">
                <div class="card-body p-3 d-flex flex-column justify-content-center">
                  <div class="d-flex align-items-center gap-2 mb-2"><i class="ti ti-building-skyscraper text-teal fs-2"></i><div class="text-muted fw-medium" style="font-size: 11px; text-transform: uppercase;">Tổng Dự Án</div></div>
                  <div class="fs-2 fw-bold text-dark" id="admTotalProj"><span class="spinner-border spinner-border-sm text-muted"></span></div>
                </div>
              </div>
            </div>
            <!-- Các box khác tương tự -->
          </div>
        </div>

        <h4 class="mb-3 text-uppercase text-muted fw-bold" style="font-size: 11px; letter-spacing: 1px;">HIỆU SUẤT CÁ NHÂN CỦA BẠN</h4>
        <div class="row g-3">
          <div class="col-sm-6">
            <div class="card metric-card border-start border-3 border-blue">
              <div class="card-body p-3 d-flex align-items-center gap-3">
                <div class="metric-icon bg-blue-lt text-blue"><i class="ti ti-address-book"></i></div>
                <div><div class="text-muted fw-medium" style="font-size: 12px;">Khách đang chăm sóc</div><div class="fs-1 fw-bold text-dark" id="myTotalCus">0</div></div>
              </div>
            </div>
          </div>
          <!-- Các box cá nhân khác -->
        </div>
      </div>

      <div class="col-lg-4">
        <div class="todo-box d-flex flex-column">
          <div class="p-3 border-bottom" style="background: #f8fafc; border-radius: 12px 12px 0 0;">
            <h3 class="m-0 fw-bold" style="color: #146654;"><i class="ti ti-list-check me-2"></i> Việc Cần Làm</h3>
          </div>
          <div class="p-3 border-bottom bg-white">
            <form onsubmit="event.preventDefault(); addTodo();" class="d-flex gap-2">
              <input type="text" id="newTodoInput" class="form-control" placeholder="Nhập công việc mới..." required>
              <button type="submit" class="btn btn-brand btn-icon"><i class="ti ti-plus"></i></button>
            </form>
          </div>
          <div class="flex-grow-1 overflow-auto" id="todoListContainer" style="max-height: 350px;">
            <div class="text-center py-5 text-muted"><span class="spinner-border spinner-border-sm"></span> Đang tải...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  async function fetchCount(table, matchObj = null) {
    try {
      let query = window.sbClient.from(table).select('id', { count: 'exact', head: true });
      if (matchObj) {
        for (let key in matchObj) {
          if (matchObj[key] === null) query = query.is(key, null);
          else query = query.eq(key, matchObj[key]);
        }
      }
      const { count, error } = await query;
      if (error) throw error;
      return count || 0;
    } catch (e) { return 0; }
  }

  async function loadDashboardStats() {
    try {
      if (!window.currentUser) return;
      const role = String(window.currentUser.role).toLowerCase().trim();
      const myId = window.currentUser.id;

      loadTodos();

      if (role.includes('admin') || role.includes('manager')) {
        document.getElementById('adminGlobalStats').style.display = 'block';
        fetchCount('customers').then(c => { const el = document.getElementById('admTotalCus'); if(el) el.innerText = new Intl.NumberFormat().format(c); });
        fetchCount('projects').then(c => { const el = document.getElementById('admTotalProj'); if(el) el.innerText = new Intl.NumberFormat().format(c); });
      }

      fetchCount('customers', { assigned_to: myId }).then(c => { const el = document.getElementById('myTotalCus'); if(el) el.innerText = new Intl.NumberFormat().format(c); });

    } catch (error) { console.error("Lỗi khởi tạo Dashboard:", error); }
  }

  async function loadTodos() {
    const container = document.getElementById('todoListContainer');
    const myId = window.currentUser.id;
    try {
      const { data, error } = await window.sbClient.from('todos').select('*').eq('user_id', myId).order('is_completed', { ascending: true }).order('created_at', { ascending: false });
      if (error) throw error;

      container.innerHTML = '';
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">Hoàn tất công việc!</div>'; return;
      }
      data.forEach(todo => {
        const isChecked = todo.is_completed ? 'checked' : '';
        const completedClass = todo.is_completed ? 'completed' : '';
        const div = document.createElement('div');
        div.className = `todo-item ${completedClass}`;
        div.innerHTML = `<input class="form-check-input todo-checkbox m-0 me-3" type="checkbox" ${isChecked} onchange="toggleTodo('${todo.id}', this.checked)"><span class="todo-text fw-medium" style="font-size: 13.5px;">${todo.task_name}</span><button class="btn btn-sm text-danger btn-icon ms-auto border-0 bg-transparent" onclick="deleteTodo('${todo.id}')"><i class="ti ti-trash"></i></button>`;
        container.appendChild(div);
      });
    } catch (err) { container.innerHTML = '<div class="text-danger p-3">Lỗi Todo list.</div>'; }
  }

  async function addTodo() {
    const input = document.getElementById('newTodoInput');
    const taskName = input.value.trim();
    if (!taskName) return;
    input.disabled = true;
    try {
      await window.sbClient.from('todos').insert([{ user_id: window.currentUser.id, task_name: taskName }]);
      input.value = ''; await loadTodos();
    } catch (err) { Swal.fire('Lỗi', err.message, 'error'); } finally { input.disabled = false; input.focus(); }
  }

  async function toggleTodo(id, isCompleted) { await window.sbClient.from('todos').update({ is_completed: isCompleted }).eq('id', id); loadTodos(); }
  async function deleteTodo(id) { await window.sbClient.from('todos').delete().eq('id', id); loadTodos(); }
</script>
